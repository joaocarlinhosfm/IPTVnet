<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StreamLine Sports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Player fullscreen -->
<div id="video-player-container" style="display:none">
    <div class="player-topbar">
        <button class="btn-back" onclick="closePlayer()"><i class="fas fa-arrow-left"></i> Voltar</button>
        <div class="player-match-info">
            <span id="player-title" class="player-title"></span>
            <span id="player-subtitle" class="player-subtitle"></span>
        </div>
        <div id="player-live-badge" class="player-live-badge" style="display:none">
            <i class="fas fa-circle"></i> AO VIVO
        </div>
        <button id="btn-fav-player" class="btn-player-icon" title="Favorito" onclick="toggleFavFromPlayer()"><i class="far fa-heart"></i></button>
        <button class="btn-player-icon" title="Picture-in-Picture" onclick="startPiP()"><i class="fas fa-clone"></i></button>
        <button class="btn-player-icon" title="Ecra inteiro" onclick="requestFS()"><i class="fas fa-expand"></i></button>
    </div>
    <div class="stream-sources" id="stream-sources"></div>
    <iframe id="main-iframe" allowfullscreen allow="autoplay; encrypted-media; fullscreen; picture-in-picture; camera; microphone"></iframe>
    <div id="player-spinner" class="player-spinner" style="display:none">
        <div class="spin-ring"></div>
        <span>A carregar...</span>
    </div>
</div>

<!-- Header -->
<header id="main-header">
    <button class="hdr-icon" onclick="toggleFavsPanel()"><i class="fas fa-bars"></i></button>
    <span class="hdr-title">HUGO<em>LINE</em></span>
    <div class="hdr-right">
        <button class="hdr-icon" onclick="toggleFavsPanel()" title="Favoritos"><i class="fas fa-star"></i></button>
        <button class="hdr-icon" onclick="refreshData()" title="Atualizar"><i class="fas fa-redo" id="refresh-icon"></i></button>
        <button class="hdr-icon" onclick="toggleSearch()" title="Pesquisar"><i class="fas fa-search"></i></button>
    </div>
</header>

<!-- Search bar -->
<div id="search-bar" class="search-bar">
    <i class="fas fa-search"></i>
    <input type="text" id="search-field" placeholder="Pesquisar equipa ou jogo...">
    <button onclick="clearSearch()"><i class="fas fa-times"></i></button>
</div>

<!-- Favoritos panel -->
<div id="favs-panel" class="favs-panel">
    <div class="favs-header">
        <span><i class="fas fa-star"></i> Favoritos</span>
        <button onclick="toggleFavsPanel()"><i class="fas fa-times"></i></button>
    </div>
    <div id="favs-list" class="favs-list"></div>
</div>
<div id="favs-backdrop" class="favs-backdrop" onclick="toggleFavsPanel()"></div>

<!-- Sports bottom sheet -->
<div id="sports-sheet" class="sports-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Selecionar Desporto</div>
    <div id="sheet-cats" class="sheet-cats"></div>
</div>
<div id="sheet-backdrop" class="favs-backdrop" onclick="closeSportsSheet()"></div>

<!-- Main content -->
<main id="main-wrap">
    <div id="cat-icons" class="cat-icons"></div>
    <div class="filter-pills" id="filter-pills">
        <button class="pill active" data-filter="all" onclick="setFilter('all')">
            <i class="fas fa-check"></i> Todos <span id="cnt-all"></span>
        </button>
        <button class="pill" data-filter="live" onclick="setFilter('live')">
            Ao Vivo <span id="cnt-live"></span>
        </button>
        <button class="pill" data-filter="upcoming" onclick="setFilter('upcoming')">
            Em Breve <span id="cnt-upcoming"></span>
        </button>
    </div>
    <div id="main-content"></div>
    <div id="empty-state" style="display:none">
        <div class="empty-inner">
            <div class="empty-icon"><i class="fas fa-calendar-times"></i></div>
            <h2 id="empty-title">Sem jogos</h2>
            <p id="empty-desc">Nao ha jogos disponiveis neste momento.</p>
            <button class="btn-primary" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Tentar novamente</button>
        </div>
    </div>
</main>

<!-- Bottom nav -->
<nav class="bottom-nav">
    <button class="bnav-btn active" id="bnav-live" onclick="bottomNav('live')">
        <i class="fas fa-broadcast-tower"></i><span>Ao Vivo</span>
    </button>
    <button class="bnav-btn" id="bnav-sports" onclick="bottomNav('sports')">
        <i class="fas fa-futbol"></i><span>Desportos</span>
    </button>
    <button class="bnav-btn" id="bnav-all" onclick="bottomNav('all')">
        <i class="fas fa-tv"></i><span>Todos</span>
    </button>
</nav>

<div id="toast-container" aria-live="assertive"></div>
<script src="app.js"></script>
</body>
</html>
