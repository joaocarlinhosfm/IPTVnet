<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamLine</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Splash -->
    <div id="splash-screen">
        <div class="splash-inner">
            <span class="splash-brand">STREAM<span>LINE</span></span>
            <p class="splash-tagline">Sports · Live · Free</p>
            <div class="splash-bar"><div class="splash-fill"></div></div>
        </div>
    </div>

    <!-- Player Full-screen -->
    <div id="video-player-container" aria-hidden="true">
        <div class="player-topbar" id="player-topbar">
            <button class="btn-back" onclick="closePlayer()">
                <i class="fas fa-arrow-left"></i> Voltar
            </button>
            <div class="player-match-info">
                <span id="player-title" class="player-title"></span>
                <span id="player-subtitle" class="player-subtitle"></span>
            </div>
            <div class="player-live-badge"><i class="fas fa-circle"></i> AO VIVO</div>
        </div>

        <!-- Múltiplas fontes de stream -->
        <div class="stream-sources" id="stream-sources"></div>

        <iframe id="main-iframe"
                sandbox="allow-scripts allow-same-origin allow-presentation allow-popups allow-forms"
                allowfullscreen
                allow="autoplay; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

        <div id="player-spinner" class="player-spinner">
            <div class="spin-ring"></div>
            <span>A carregar stream…</span>
        </div>
    </div>

    <!-- Header -->
    <header id="main-header">
        <div class="header-left">
            <div class="brand-wrap">
                <span class="brand-logo">STREAM<em>LINE</em></span>
                <span class="brand-tag">SPORTS</span>
            </div>
            <nav class="sport-tabs" id="sport-tabs" role="tablist">
                <div class="tabs-loading">
                    <div class="tab-ghost"></div><div class="tab-ghost"></div>
                    <div class="tab-ghost"></div><div class="tab-ghost"></div>
                </div>
            </nav>
        </div>
        <div class="header-right">
            <div class="search-box" id="search-box">
                <button class="search-toggle" onclick="toggleSearch()"><i class="fas fa-search"></i></button>
                <input type="text" id="search-field" placeholder="Equipa, liga…" oninput="filterMatches()">
                <button class="search-clear" id="search-clear" onclick="clearSearch()"><i class="fas fa-times"></i></button>
            </div>
            <button class="btn-icon" onclick="refreshData()" title="Atualizar"><i class="fas fa-sync-alt" id="refresh-icon"></i></button>
            <button class="btn-icon" onclick="toggleModal(true)" title="Livestreams"><i class="fas fa-plus"></i></button>
        </div>
    </header>

    <main class="content" id="main-scroll">
        <!-- Hero -->
        <section id="hero-featured" style="display:none">
            <div class="hero-bg" id="hero-bg"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <div class="hero-badges">
                    <span class="badge-live"><i class="fas fa-circle"></i> AO VIVO</span>
                    <span id="hero-league" class="badge-league"></span>
                </div>
                <div id="hero-teams" class="hero-teams"></div>
                <p id="hero-time" class="hero-time"></p>
                <div class="hero-actions">
                    <button id="hero-play" class="btn-hero-play"><i class="fas fa-play"></i> Ver Agora</button>
                </div>
            </div>
        </section>

        <!-- Live ticker -->
        <div id="live-bar" class="live-bar" style="display:none">
            <span class="live-bar-label"><i class="fas fa-circle"></i> AO VIVO</span>
            <div class="live-bar-track" id="live-bar-track"></div>
        </div>

        <div id="main-content"></div>
    </main>

    <!-- Empty state -->
    <div id="empty-state" style="display:none">
        <div class="empty-inner">
            <div class="empty-icon"><i class="fas fa-calendar-times"></i></div>
            <h2 id="empty-title">Sem jogos disponíveis</h2>
            <p id="empty-desc">Não há jogos agendados nesta categoria de momento.</p>
            <button class="btn-primary" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Tentar novamente</button>
        </div>
    </div>

    <!-- Modal livestreams -->
    <div id="config-modal" role="dialog" aria-modal="true" style="display:none">
        <div class="modal-backdrop" onclick="toggleModal(false)"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Livestreams</h2>
                <button class="modal-close" onclick="toggleModal(false)"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-section">
                <div class="section-label"><i class="fas fa-link"></i> Adicionar stream direto</div>
                <p class="section-desc">Qualquer URL de stream ou site embed.</p>
                <div class="input-group">
                    <input type="url" id="direct-stream-url" placeholder="https://…">
                    <input type="text" id="direct-stream-name" placeholder="Nome do canal" style="margin-top:8px">
                </div>
                <button class="btn-primary full" onclick="addDirectStream()"><i class="fas fa-plus"></i> Adicionar</button>
            </div>
            <div id="saved-streams-list" class="saved-streams-list"></div>
        </div>
    </div>

    <div id="toast-container" aria-live="assertive"></div>
    <script src="app.js"></script>
</body>
</html>
