<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StreamLine Sports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Player fullscreen -->
<div id="video-player-container" style="display:none">
    <div class="player-topbar">
        <button class="btn-back" onclick="closePlayer()">
            <i class="fas fa-arrow-left"></i> Voltar
        </button>
        <div class="player-match-info">
            <span id="player-title" class="player-title"></span>
            <span id="player-subtitle" class="player-subtitle"></span>
        </div>
        <div id="player-live-badge" class="player-live-badge" style="display:none">
            <i class="fas fa-circle"></i> AO VIVO
        </div>
        <button id="btn-fav-player" class="btn-player-icon" title="Favorito" onclick="toggleFavFromPlayer()">
            <i class="far fa-heart"></i>
        </button>
        <button class="btn-player-icon" title="Picture-in-Picture" onclick="startPiP()">
            <i class="fas fa-clone"></i>
        </button>
        <button class="btn-player-icon" title="Ecra inteiro" onclick="requestFS()">
            <i class="fas fa-expand"></i>
        </button>
    </div>
    <div class="stream-sources" id="stream-sources"></div>
    <iframe id="main-iframe"
        allowfullscreen
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture; camera; microphone">
    </iframe>
    <div id="player-spinner" class="player-spinner" style="display:none">
        <div class="spin-ring"></div>
        <span>A carregar...</span>
    </div>
</div>

<!-- Header -->
<header id="main-header">
    <div class="header-left">
        <div class="brand-wrap">
            <span class="brand-logo">STREAM<em>LINE</em></span>
            <span class="brand-tag">SPORTS</span>
        </div>
        <nav class="sport-tabs" id="sport-tabs" role="tablist">
            <div class="tabs-loading">
                <div class="tab-ghost"></div>
                <div class="tab-ghost"></div>
                <div class="tab-ghost"></div>
            </div>
        </nav>
    </div>
    <div class="header-right">
        <button class="btn-icon" id="btn-favs" onclick="toggleFavsPanel()" title="Favoritos">
            <i class="fas fa-heart"></i>
        </button>
        <div class="search-box" id="search-box">
            <button class="search-toggle" onclick="toggleSearch()">
                <i class="fas fa-search"></i>
            </button>
            <input type="text" id="search-field" placeholder="Equipa, jogo...">
            <button class="search-clear" id="search-clear" onclick="clearSearch()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <button class="btn-icon" onclick="refreshData()" title="Atualizar">
            <i class="fas fa-sync-alt" id="refresh-icon"></i>
        </button>
    </div>
</header>

<!-- Favoritos panel -->
<div id="favs-panel" class="favs-panel">
    <div class="favs-header">
        <span><i class="fas fa-heart"></i> Favoritos</span>
        <button onclick="toggleFavsPanel()"><i class="fas fa-times"></i></button>
    </div>
    <div id="favs-list" class="favs-list"></div>
</div>
<div id="favs-backdrop" class="favs-backdrop" onclick="toggleFavsPanel()"></div>

<!-- Conteudo principal -->
<main class="content" id="main-scroll">

    <!-- Hero -->
    <section id="hero-featured" style="display:none">
        <div class="hero-bg" id="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-badges">
                <span id="hero-live-badge" class="badge-live" style="display:none">
                    <i class="fas fa-circle"></i> AO VIVO
                </span>
                <span id="hero-league" class="badge-league"></span>
            </div>
            <div id="hero-teams" class="hero-teams"></div>
            <p id="hero-time" class="hero-time"></p>
            <div class="hero-actions">
                <button id="hero-play" class="btn-hero-play">
                    <i class="fas fa-play"></i> Ver Agora
                </button>
                <button id="hero-fav" class="btn-hero-fav" onclick="toggleFavFromHero()">
                    <i class="far fa-heart"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- Live ticker -->
    <div id="live-bar" class="live-bar" style="display:none">
        <span class="live-bar-label"><i class="fas fa-circle"></i> AO VIVO</span>
        <div class="live-bar-track" id="live-bar-track"></div>
    </div>

    <!-- Jogos -->
    <div id="main-content"></div>
</main>

<!-- Empty / erro -->
<div id="empty-state" style="display:none">
    <div class="empty-inner">
        <div class="empty-icon"><i class="fas fa-calendar-times"></i></div>
        <h2 id="empty-title">Sem jogos disponiveis</h2>
        <p id="empty-desc">Nao ha jogos agendados neste momento.</p>
        <button class="btn-primary" onclick="refreshData()">
            <i class="fas fa-sync-alt"></i> Tentar novamente
        </button>
    </div>
</div>

<div id="toast-container" aria-live="assertive"></div>
<script src="app.js"></script>
</body>
</html>
